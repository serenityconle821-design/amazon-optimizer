        const { useState, useEffect, useRef } = React;

        const IconUpload = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>;

        const IconAlertTriangle = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ffcc00" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
        const IconFileText = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;
        const IconEdit3 = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
        const IconTrendingDown = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"></polyline><polyline points="16 17 22 17 22 11"></polyline></svg>;
        const IconPercent = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="5" x2="5" y2="19"></line><circle cx="6.5" cy="6.5" r="2.5"></circle><circle cx="17.5" cy="17.5" r="2.5"></circle></svg>;
        const IconChevron = ({ open }) => <svg className={`w-4 h-4 transition-transform ${open ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>;

        function AmazonBidOptimizer() {
            const [activeTab, setActiveTab] = useState('optimizer'); 
            const [isProcessing, setIsProcessing] = useState(false);
            const [progressMsg, setProgressMsg] = useState("");
            
            const [fileData, setFileData] = useState(null);
            const [slimExport, setSlimExport] = useState(true);
            const fileInputRef = useRef(null);

            const [extractedSpus, setExtractedSpus] = useState([]);
            const [activeCampaigns, setActiveCampaigns] = useState([]); 
            const [automatedCampaignIds, setAutomatedCampaignIds] = useState(new Set());
            const [dedupSet, setDedupSet] = useState(new Set());
            const [activeAdGroupIds, setActiveAdGroupIds] = useState(new Set()); 
            const [campaignStartDates, setCampaignStartDates] = useState(new Map());
            const [campaignStrategies, setCampaignStrategies] = useState(new Map()); 

            const [allCampaignMeta, setAllCampaignMeta] = useState([]);
            const [availablePortfolios, setAvailablePortfolios] = useState([]);
            const [selectedPortfolios, setSelectedPortfolios] = useState(['ALL']);

            const [spuRules, setSpuRules] = useState([{ id: Date.now(), keyword: '', targetAcos: 25, negClick: 25, negSpend: 15.0, negAcos: 30, _selected: true }]);
            const [batchTargetAcos, setBatchTargetAcos] = useState(25);
            const [summary, setSummary] = useState(null);
            
            const [logFilter, setLogFilter] = useState('all');
            const [logSearchText, setLogSearchText] = useState("");
            const [logSortBy, setLogSortBy] = useState("default");
            const [churnLogSearchText, setChurnLogSearchText] = useState("");
            const [churnLogSortBy, setChurnLogSortBy] = useState("default");
            
            const [selectedLogIds, setSelectedLogIds] = useState(new Set());
            const [selectedChurnLogIds, setSelectedChurnLogIds] = useState(new Set());
            
            const [panels, setPanels] = useState({ tos: false, macro: false, micro: false, spu: true, bid: true, manager: true });
            const togglePanel = (key) => setPanels(prev => ({ ...prev, [key]: !prev[key] }));

            const [managerMap, setManagerMap] = useState({});

            const [params, setParams] = useState({
                acosBuffer: 10, maxBid: 1.00, minBid: 0.10, clickThreshold: 20, impressionThreshold: 500, increasePcnt: 10, decreasePcnt: 20,
                tosTargetAcos: 20, tosLowSpendThreshold: 10.0, increaseTosPcnt: 15, decreaseTosPcnt: 15,
                negClickThreshold: 25, negSpendThreshold: 15.0, negAcosThreshold: 30, enableAutoNegatives: true,
                pauseClickThresholdTarget: 35, pauseSpendThresholdTarget: 20, pauseAcosThresholdTarget: 60, 
                pauseClickThresholdSku: 30, pauseSpendThresholdSku: 20, pauseAcosThresholdSku: 50,
                pauseSpendThresholdCampaign: 40, pauseSpendThresholdAdGroup: 30, enableTimeBasedPause: false, pauseTimeThresholdDays: 14
            });

            const negFileInputRef = useRef(null);
            const [globalNegState, setGlobalNegState] = useState({ spu: '', exact: '', phrase: '', asin: '' });

            const [churnFileData, setChurnFileData] = useState(null);
            const churnInputRef = useRef(null);
            const [engineCState, setEngineCState] = useState({ threshold: 60, minOrders: 2, actionType: 'campaign_and_sku' });
            const [engineCSummary, setEngineCSummary] = useState(null);

            const [engineDInput, setEngineDInput] = useState('');
            const [engineDMatched, setEngineDMatched] = useState(null);
            const [engineDBatchMode, setEngineDBatchMode] = useState('add');
            const [engineDBatchVal, setEngineDBatchVal] = useState(10);

            const [dialog, setDialog] = useState(null);
            const showAlert = (message) => setDialog({ message });
            const showConfirm = (message, onConfirm) => setDialog({ message, onConfirm });

            const MAX_LOGS_DISPLAY = 500;

            useEffect(() => {
                if (!allCampaignMeta || allCampaignMeta.length === 0) return;
                const spuSet = new Set();
                allCampaignMeta.forEach(camp => {
                    if (!selectedPortfolios.includes('ALL') && !selectedPortfolios.includes(camp.portfolio)) return;
                    if (camp.state !== 'enabled' && camp.state !== '已启用') return;
                    const segments = camp.cName.split(/[-_ \/]+/);
                    for (const seg of segments) {
                        if (!/[\u4e00-\u9fa5]/.test(seg) && seg.length >= 4 && /[A-Za-z0-9]/.test(seg)) { spuSet.add(seg.toUpperCase()); break; }
                    }
                });
                const spuArray = Array.from(spuSet).sort();
                setExtractedSpus(spuArray);
                let autoRules = spuArray.map((spu, i) => ({ id: Date.now() + i, keyword: spu, targetAcos: 25, negClick: 25, negSpend: 15.0, negAcos: 30, _selected: true }));
                autoRules.push({ id: Date.now() + 10000, keyword: '', targetAcos: 25, negClick: 25, negSpend: 15.0, negAcos: 30, _selected: true });
                setSpuRules(autoRules);
            }, [allCampaignMeta, selectedPortfolios]);

            const handleParamChange = (e) => {
                const { name, value, type, checked } = e.target;
                const finalValue = type === 'checkbox' ? checked : (parseFloat(value) || 0);
                setParams(prev => ({ ...prev, [name]: finalValue }));
                setSummary(null); 
            };

            const addSpuRule = () => setSpuRules([{ id: Date.now(), keyword: '', targetAcos: 25, negClick: 25, negSpend: 15.0, negAcos: 30, _selected: true }, ...spuRules]);
            const updateSpuRule = (id, field, value) => { setSpuRules(spuRules.map(r => r.id === id ? { ...r, [field]: value } : r)); setSummary(null); };
            const removeSpuRule = (id) => { setSpuRules(spuRules.filter(r => r.id !== id)); setSummary(null); };

            const getVal = (row, keys) => {
                const rowKeys = Object.keys(row);
                for (let k of keys) {
                    const lowerK = String(k).trim().toLowerCase();
                    const matchedKey = rowKeys.find(rk => String(rk).trim().toLowerCase() === lowerK);
                    if (matchedKey && row[matchedKey] !== undefined && row[matchedKey] !== null) return String(row[matchedKey]).trim();
                }
                return "";
            };

            const getMetric = (row, possibleKeys) => {
                const rowKeys = Object.keys(row);
                for (let pk of possibleKeys) {
                    const lowerPk = String(pk).trim().toLowerCase();
                    const matched = rowKeys.find(k => String(k).trim().toLowerCase() === lowerPk);
                    if (matched && row[matched] !== undefined && row[matched] !== '') {
                        const val = String(row[matched]).replace(/[,%\$]/g, '').trim();
                        const parsed = parseFloat(val);
                        return isNaN(parsed) ? 0 : parsed;
                    }
                }
                return 0;
            };

            const parseAmzDate = (dateStr) => {
                if (!dateStr) return null;
                dateStr = String(dateStr).trim().replace(/\./g, '/').replace(/-/g, '/');
                if (/^\d{8}$/.test(dateStr)) return new Date(parseInt(dateStr.slice(0,4)), parseInt(dateStr.slice(4,6))-1, parseInt(dateStr.slice(6,8)));
                const d = new Date(dateStr);
                if (!isNaN(d.getTime())) return d;
                return null;
            };

            const handleManagerFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const workbook = window.XLSX.read(new Uint8Array(evt.target.result), { type: 'array' });
                        const data = window.XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                        const newMap = {};
                        data.forEach(row => { if (row.length >= 2 && row[0] && row[1]) newMap[String(row[0]).trim().toUpperCase()] = String(row[1]).trim(); });
                        setManagerMap(newMap);
                        showAlert(`成功导入 ${Object.keys(newMap).length} 条负责人映射规则！`);
                    } catch (err) { showAlert("读取 Excel 失败：" + err.message); }
                };
                reader.readAsArrayBuffer(file);
            };

            const handleNegFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        let workbook;
                        if (file.name.toLowerCase().endsWith('.csv')) workbook = window.XLSX.read(evt.target.result, { type: 'string' });
                        else workbook = window.XLSX.read(new Uint8Array(evt.target.result), { type: 'array' });
                        
                        const data = window.XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                        if (data.length < 2) throw new Error("表格数据不足或为空");

                        const headers = data[0].map(h => String(h).trim().toLowerCase());
                        const kwIdx = headers.findIndex(h => h.includes('keyword') || h.includes('关键词'));
                        const matchIdx = headers.findIndex(h => h.includes('match type') || h.includes('匹配类型'));

                        if (kwIdx === -1) throw new Error("未找到带有 'Keyword' 或 '关键词' 的表头列");

                        let newExacts = [];
                        let newPhrases = [];

                        for (let i = 1; i < data.length; i++) {
                            const row = data[i];
                            if (!row || !row[kwIdx]) continue;
                            const kw = String(row[kwIdx]).trim();
                            if (!kw) continue;

                            let matchType = 'phrase'; 
                            if (matchIdx !== -1 && row[matchIdx]) {
                                const m = String(row[matchIdx]).toLowerCase();
                                if (m.includes('exact') || m.includes('精准')) matchType = 'exact';
                            }
                            if (matchType === 'exact') newExacts.push(kw);
                            else newPhrases.push(kw);
                        }

                        setGlobalNegState(prev => {
                            const exactList = prev.exact ? prev.exact.split('\n').map(s=>s.trim()).filter(s=>s) : [];
                            const phraseList = prev.phrase ? prev.phrase.split('\n').map(s=>s.trim()).filter(s=>s) : [];
                            return { 
                                ...prev, 
                                exact: Array.from(new Set([...exactList, ...newExacts])).join('\n'), 
                                phrase: Array.from(new Set([...phraseList, ...newPhrases])).join('\n') 
                            };
                        });
                        showAlert(`✅ 成功读取否词文件！新增了 ${newExacts.length} 个精准否定，${newPhrases.length} 个词组否定。已自动为您拼接并去重。`);
                    } catch (err) { showAlert("解析否词库失败：" + err.message); }
                };
                if (file.name.toLowerCase().endsWith('.csv')) reader.readAsText(file, 'utf-8'); 
                else reader.readAsArrayBuffer(file);
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setIsProcessing(true); setProgressMsg("正在极速解析底层数据..."); setSummary(null); setFileData(null); setLogFilter('all'); setLogSearchText(''); setLogSortBy('default'); setSelectedLogIds(new Set()); setEngineDMatched(null);

                const reader = new FileReader();
                reader.onload = (evt) => {
                    setTimeout(() => {
                        try {
                            if (!window.XLSX) { showAlert("Excel 解析库尚未加载完成，请稍后再试！"); setIsProcessing(false); return; }
                            
                            let workbook;
                            if (file.name.toLowerCase().endsWith('.csv')) workbook = window.XLSX.read(evt.target.result, { type: 'string' });
                            else { const data = new Uint8Array(evt.target.result); workbook = window.XLSX.read(data, { type: 'array' }); }
                            
                            const targetSheetName = workbook.SheetNames.find(n => n.includes('Sponsored Products') || n.includes('商品推广')) || workbook.SheetNames[0];
                            const worksheet = workbook.Sheets[targetSheetName];
                            
                            const rawSheetData = window.XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                            if(rawSheetData.length === 0) throw new Error("表格数据为空");
                            
                            let headerRowIndex = 0;
                            for(let i=0; i<Math.min(10, rawSheetData.length); i++) {
                                if(rawSheetData[i] && rawSheetData[i].length > 5 && rawSheetData[i].some(c => String(c).toLowerCase().includes('entity') || String(c).includes('实体'))) { headerRowIndex = i; break; }
                            }

                            const originalHeaders = rawSheetData[headerRowIndex] || [];
                            const errorCols = ['original sheet', 'original record #', 'error type', 'error code', 'error message', 'optimizer note', '初始工作表', '初始记录 #', '错误类型', '错误代码', '错误消息'];
                            const cleanHeaders = originalHeaders.filter(h => h && !errorCols.includes(String(h).trim().toLowerCase()));
                            const jsonData = window.XLSX.utils.sheet_to_json(worksheet, { range: headerRowIndex, raw: false });
                            
                            let currentWaterfallCampId = ''; let currentWaterfallAdgId = ''; let currentWaterfallCampName = ''; 
                            const h_campId_exact = cleanHeaders.find(h => ['campaign id', '广告活动编号', '广告活动 id'].includes(String(h).trim().toLowerCase())) || 'Campaign ID';
                            const h_adgId_exact = cleanHeaders.find(h => ['ad group id', '广告组编号', '广告组 id'].includes(String(h).trim().toLowerCase())) || 'Ad Group ID';
                            const h_campName_exact = cleanHeaders.find(h => ['campaign name (informational only)', '广告活动名称（仅供参考）', 'campaign name', '广告活动名称'].includes(String(h).trim().toLowerCase())) || 'Campaign Name (Informational only)';

                            const campNameToId = new Map(); const adgNameToId = new Map(); const tempAutoCampIds = new Set(); 

                            jsonData.forEach(row => {
                                const entity = String(getVal(row, ['Entity', '实体', '实体层级', 'Record Type'])).trim().toLowerCase();
                                const cId = getVal(row, ['Campaign Id', '广告活动编号', '广告活动 ID', 'Campaign ID']);
                                const cName = getVal(row, ['Campaign Name (Informational only)', '广告活动名称（仅供参考）', 'Campaign Name', '广告活动名称']);

                                                    <p className="text-[11px] text-gray-500 mb-4">不再受组合与横杠限制！只要在下方输入或选择您的目标核心词，系统将自动扫描出名称中【包含】该词的<b>所有存活广告活动</b>，并强行注射否定指令。</p>
                                                    <input type="text" list="extracted-spus" value={globalNegState.spu} onChange={e => setGlobalNegState({...globalNegState, spu: e.target.value.toUpperCase()})} placeholder="输入或选择目标 SPU (例如: D7A280)" className="w-full md:w-1/3 bg-[#f5f5f7] border border-gray-100 rounded-xl p-3 outline-none text-sm font-bold text-[#007aff] transition-all uppercase focus:border-[#007aff]" />
                                                    <datalist id="extracted-spus">{extractedSpus.map(spu => <option key={spu} value={spu} />)}</datalist>
                                                </div>

                                                <div className={`transition-opacity duration-300 ${!globalNegState.spu ? 'opacity-30 pointer-events-none' : 'opacity-100'}`}>
                                                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4">
                                                        <h2 className="text-lg font-bold text-[#1d1d1f]">2. 录入绞杀名单 (Blacklist Payload)</h2>
                                                        <button onClick={() => negFileInputRef.current.click()} className="text-[12px] font-bold bg-[#1d1d1f] hover:bg-black text-white px-4 py-2 rounded-xl transition-colors flex items-center gap-1 shadow-sm shrink-0">
                                                            <IconUpload /> 导入独立否词库
                                                        </button>
                                                        <input type="file" ref={negFileInputRef} onChange={handleNegFileUpload} onClick={e => e.target.value = null} className="hidden" accept=".xlsx, .csv" />
                                                    </div>
                                                    
                                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                                                        <div className="bg-[#f9f9fb] p-5 rounded-[20px] border border-gray-100 flex flex-col">
                                                            <label className="text-sm font-bold text-[#1d1d1f] mb-1">精确否定 (Exact)</label><p className="text-[10px] text-[#86868b] mb-3">每行一个烂词</p>
                                                            <textarea value={globalNegState.exact} onChange={e => setGlobalNegState({...globalNegState, exact: e.target.value})} className="w-full h-64 bg-white border border-gray-200 rounded-xl p-3 text-[13px] text-[#1d1d1f] font-mono resize-none transition-all focus:border-[#007aff]" placeholder={"heel for women\nblack heel"} />
                                                        </div>
                                                        <div className="bg-[#f9f9fb] p-5 rounded-[20px] border border-gray-100 flex flex-col">
                                                            <label className="text-sm font-bold text-[#1d1d1f] mb-1">词组否定 (Phrase)</label><p className="text-[10px] text-[#86868b] mb-3">每行一个垃圾词根</p>
                                                            <textarea value={globalNegState.phrase} onChange={e => setGlobalNegState({...globalNegState, phrase: e.target.value})} className="w-full h-64 bg-white border border-gray-200 rounded-xl p-3 text-[13px] text-[#1d1d1f] font-mono resize-none transition-all focus:border-[#007aff]" placeholder={"cheap\nfree"} />
                                                        </div>
                                                        <div className="bg-[#f9f9fb] p-5 rounded-[20px] border border-gray-100 flex flex-col">
                                                            <label className="text-sm font-bold text-[#1d1d1f] mb-1">竞品拦截 (ASIN)</label><p className="text-[10px] text-[#86868b] mb-3">粘贴自动净化格式</p>
                                                            <textarea value={globalNegState.asin} onChange={e => setGlobalNegState({...globalNegState, asin: e.target.value})} className="w-full h-64 bg-white border border-gray-200 rounded-xl p-3 text-[13px] text-[#1d1d1f] font-mono uppercase resize-none transition-all focus:border-[#007aff]" placeholder={"B0XXXXXX\nB0YYYYYY"} />
                                                        </div>
                                                    </div>

                                                    <div className="flex flex-col md:flex-row items-center justify-between border-t border-gray-100 pt-6 gap-4">
                                                        <div className="text-[11px] text-[#86868b] flex gap-4 flex-wrap"><span>精确待载入: <b className="text-[#1d1d1f]">{globalNegState.exact.split('\n').filter(s => s.trim()).length}</b></span><span>词组待载入: <b className="text-[#1d1d1f]">{globalNegState.phrase.split('\n').filter(s => s.trim()).length}</b></span><span>ASIN待载入: <b className="text-[#1d1d1f]">{globalNegState.asin.split('\n').filter(s => s.trim()).length}</b></span></div>
                                                        <button onClick={handleEngineBExport} disabled={!globalNegState.spu || (!globalNegState.exact.trim() && !globalNegState.phrase.trim() && !globalNegState.asin.trim())} className="w-full md:w-auto bg-[#ff3b30] hover:bg-[#d70015] disabled:bg-[#d2d2d7] text-white text-sm font-bold py-3 px-8 rounded-xl flex items-center justify-center gap-2 transition-colors shadow-sm whitespace-nowrap"><IconDownload />输出标准底层强压包 (V3)</button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {activeTab === 'churnCleanser' && (
                                        <div className="max-w-5xl mx-auto py-4 animate-in fade-in w-full">
                                            <div className="bg-[#f9f9fb] rounded-[24px] p-8 border border-gray-100 shadow-sm w-full">
                                                <div className="mb-6 flex flex-col md:flex-row justify-between items-start gap-6">
                                                    <div className="flex-1 min-w-0">
                                                        <h2 className="text-lg font-bold text-[#1d1d1f] mb-2">流失率跨表猎杀器 (Churn Rate Cleanser)</h2>
                                                        <p className="text-[11px] text-gray-500 max-w-2xl leading-relaxed">支持多选并发！您可以一次性框选上传<b className="text-gray-800">所有维度的流失表</b>。系统将自动过滤单量过少的偶然性记录，精准狙击真正存在巨额流失的广告实体。</p>
                                                    </div>
                                                    <div className="flex flex-wrap md:flex-nowrap gap-4 shrink-0">
                                                        <div className="flex flex-col items-end">
                                                            <label className="text-[10px] font-bold text-gray-500 mb-1">总单量大于 ({">"}单)</label>
                                                            <input type="number" className="w-20 text-center font-black text-xl text-[#007aff] bg-white border border-gray-200 rounded-lg p-1 outline-none focus:border-[#007aff]" value={engineCState.minOrders} onChange={(e) => setEngineCState({...engineCState, minOrders: parseInt(e.target.value) || 0})} />
                                                        </div>
                                                        <div className="flex flex-col items-end">
                                                            <label className="text-[10px] font-bold text-gray-500 mb-1">流失率红线 ({"≥"}%)</label>
                                                            <input type="number" className="w-20 text-center font-black text-xl text-[#ff9500] bg-white border border-gray-200 rounded-lg p-1 outline-none focus:border-[#ff9500]" value={engineCState.threshold} onChange={(e) => setEngineCState({...engineCState, threshold: parseFloat(e.target.value) || 0})} />
                                                        </div>
                                                        <div className="flex flex-col items-end">
                                                            <label className="text-[10px] font-bold text-gray-500 mb-1">执行绞杀层级</label>
                                                            <select className="h-[36px] bg-white border border-gray-200 rounded-lg px-2 text-xs font-bold text-[#1d1d1f] outline-none cursor-pointer focus:border-[#007aff]" value={engineCState.actionType} onChange={(e) => setEngineCState({...engineCState, actionType: e.target.value})}>
                                                                <option value="campaign_and_sku">精准打击：活动及高流失SKU</option>
                                                                <option value="sku_only">只停用高流失的变体/SKU</option>
                                                                <option value="campaign_only">只停用高流失广告活动</option>
                                                            </select>
                                                        </div>
                                                    </div>
                                                </div>

                                                {!churnFileData ? (
                                                    <div onClick={() => !isProcessing && churnInputRef.current.click()} className={`border-2 border-dashed rounded-[18px] p-8 flex flex-col items-center justify-center transition-all ${isProcessing ? 'border-[#ff9500] bg-[#fffaf0] opacity-70' : 'border-[#d2d2d7] hover:border-[#ff9500] hover:bg-[#fffcf8] cursor-pointer'}`}>
                                                        {isProcessing ? <IconLoader /> : <IconUpload />}
                                                        <p className="text-[#1d1d1f] font-semibold mt-4 text-sm">{isProcessing ? progressMsg : "点击框选所有流失率报表 (.xlsx / .csv)"}</p>
                                                        <p className="text-[10px] text-gray-400 mt-2">支持多选，系统会自动无视大小写拼接读取所有带Emoji异构表头</p>
                                                    </div>
                                                ) : (
                                                    <div className="bg-[#fffaf0] border border-[#ffe0b2] rounded-[18px] p-5 flex flex-col gap-4">
                                                        <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                                            <div className="flex items-center gap-4">
                                                                <div className="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-[#ff9500] shrink-0"><IconTrendingDown /></div>
                                                                <div className="max-w-[500px] min-w-0"><p className="text-sm font-bold text-[#1d1d1f] truncate" title={churnFileData.fileName}>{churnFileData.fileName}</p><p className="text-[11px] text-[#86868b] mt-1">已锁定数据层: {churnFileData.sheetName}</p></div>
                                                            </div>
                                                            <button onClick={() => {setChurnFileData(null); setEngineCSummary(null); setSelectedChurnLogIds(new Set());}} className="text-xs font-bold text-[#ff9500] hover:underline px-4 shrink-0 bg-orange-50 py-1.5 rounded-lg border border-orange-200">更换报告</button>
                                                        </div>
                                                        
                                                        {!engineCSummary ? (
                                                            <button onClick={handleEngineCProcess} className="w-full bg-[#1d1d1f] hover:bg-black text-white text-sm font-bold py-3 rounded-xl shadow-md transition-all flex items-center justify-center gap-2"><IconAlertTriangle /> 启动流失率全息清剿</button>
                                                        ) : (
                                                            <div className="animate-in fade-in space-y-4 w-full">
                                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                                    <div className="bg-red-50 rounded-xl p-4 border border-red-100 shadow-sm relative overflow-hidden">
                                                                        <div className="absolute top-0 right-0 w-16 h-16 bg-red-100 rounded-bl-full -mr-4 -mt-4 opacity-50"></div>
                                                                        <p className="font-bold text-red-800 mb-3 flex items-center gap-1.5"><IconActivity /> 靶向锁定高流失活动: <span className="text-xl mx-1">{engineCSummary.badCampaignsTotal}</span> 个</p>
                                                                        <div className="flex justify-between text-[11px] text-red-600 bg-white/60 p-2 rounded-lg border border-red-100/50">
                                                                            <span className="flex flex-col items-center">成功执行绞杀<b className="text-red-700 text-lg">{engineCSummary.pausedCampCount}</b></span>
                                                                            <span className="flex flex-col items-center opacity-70">原状态已暂停/归档<b className="text-sm">{engineCSummary.alreadyPausedCampCount}</b></span>
                                                                            <span className="flex flex-col items-center opacity-70">表中未找到<b className="text-sm">{engineCSummary.notFoundCampCount}</b></span>
                                                                        </div>
                                                                    </div>
                                                                    <div className="bg-orange-50 rounded-xl p-4 border border-orange-100 shadow-sm relative overflow-hidden">
                                                                        <div className="absolute top-0 right-0 w-16 h-16 bg-orange-100 rounded-bl-full -mr-4 -mt-4 opacity-50"></div>
                                                                        <p className="font-bold text-orange-800 mb-3 flex items-center gap-1.5"><IconAlertTriangle /> 靶向锁定高流失 SKU: <span className="text-xl mx-1">{engineCSummary.badSkusTotal}</span> 个</p>
                                                                        <div className="flex justify-between text-[11px] text-orange-600 bg-white/60 p-2 rounded-lg border border-orange-100/50">
                                                                            <span className="flex flex-col items-center">成功执行绞杀<b className="text-orange-700 text-lg">{engineCSummary.pausedSkuCount}</b></span>
                                                                            <span className="flex flex-col items-center opacity-70">原状态已暂停/归档<b className="text-sm">{engineCSummary.alreadyPausedSkuCount}</b></span>
                                                                            <span className="flex flex-col items-center opacity-70">表中未找到<b className="text-sm">{engineCSummary.notFoundSkuCount}</b></span>
                                                                        </div>
                                                                    </div>
                                                                </div>

                                                                <div className="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm mt-4 w-full">
                                                                    <div className="bg-gray-50 px-4 py-3 border-b border-gray-200 flex flex-col xl:flex-row justify-between gap-4">
                                                                        <span className="text-xs font-bold text-[#1d1d1f] flex items-center gap-1"><IconEdit3 />绞杀执行日志 (可手动撤销)</span>
                                                                        <div className="flex flex-col md:flex-row items-start md:items-center gap-3">
                                                                            <div className="flex gap-2">
                                                                                <input type="text" placeholder="搜索日志..." value={churnLogSearchText} onChange={e => setChurnLogSearchText(e.target.value)} className="px-2 py-1 text-xs border border-gray-300 rounded focus:border-[#007aff] outline-none w-28 md:w-40" />
                                                                                <select value={churnLogSortBy} onChange={e => setChurnLogSortBy(e.target.value)} className="px-2 py-1 text-xs border border-gray-300 rounded bg-white focus:border-[#007aff] outline-none cursor-pointer"><option value="default">默认顺序</option><option value="rateDesc">流失率由高到低</option><option value="ordersDesc">单量由多到少</option></select>
                                                                            </div>
                                                                            <div className="flex items-center gap-2">
                                                                                <span className="text-[10px] text-gray-500 whitespace-nowrap">已选 {selectedChurnLogIds.size} 项</span>
                                                                                <button onClick={handleBulkChurnRevert} className="text-[10px] font-bold bg-white border border-gray-300 text-gray-700 px-3 py-1 rounded hover:bg-gray-50 transition-colors shadow-sm whitespace-nowrap">批量赦免选中</button>
                                                                                <span className="text-[10px] text-gray-500 whitespace-nowrap">扫描 {engineCSummary.scannedChurnRows} 记录</span>
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                    <div className="max-h-[400px] overflow-y-auto overflow-x-auto log-scroll-container">
                                                                        <table className="w-full text-[11px] text-left min-w-[700px]">
                                                                            <thead className="bg-white sticky top-0 z-10 shadow-sm">
                                                                                <tr>
                                                                                    <th className="px-4 py-2 w-8 text-center border-b border-gray-100"><input type="checkbox" className="cursor-pointer" checked={displayChurnLogs.length > 0 && displayChurnLogs.every(log => selectedChurnLogIds.has(log.logId))} onChange={(e) => { const newSet = new Set(selectedChurnLogIds); if (e.target.checked) { displayChurnLogs.forEach(log => newSet.add(log.logId)); } else { displayChurnLogs.forEach(log => newSet.delete(log.logId)); } setSelectedChurnLogIds(newSet); }} title="全选/反选" /></th>
                                                                                    <th className="px-2 py-2 font-medium text-gray-500 border-b border-gray-100">被绞杀活动</th><th className="px-2 py-2 font-medium text-gray-500 border-b border-gray-100">实体层级</th><th className="px-2 py-2 font-medium text-gray-500 border-b border-gray-100">触发红线</th><th className="px-4 py-2 font-medium text-[#007aff] text-right border-b border-gray-100">人工复核</th>
                                                                                </tr>
                                                                            </thead>
                                                                            <tbody className="divide-y divide-gray-50">
                                                                                {visibleChurnLogs.map((log) => (
                                                                                    <tr key={log.logId} className="hover:bg-orange-50/30">
                                                                                        <td className="px-4 py-2 text-center"><input type="checkbox" className="cursor-pointer" checked={selectedChurnLogIds.has(log.logId)} onChange={(e) => { const newSet = new Set(selectedChurnLogIds); if(e.target.checked) newSet.add(log.logId); else newSet.delete(log.logId); setSelectedChurnLogIds(newSet); }} /></td>
                                                                                        <td className="px-2 py-2 font-medium text-gray-800 truncate max-w-[200px]" title={log.campaign}>{log.campaign}{log.isAutomated && <span className="ml-1 px-1 bg-blue-100 text-blue-600 rounded text-[9px]">自动</span>}</td>
                                                                                        <td className="px-2 py-2 text-gray-600">{log.target}</td><td className="px-2 py-2 text-red-600 font-bold">{log.reason}</td>
                                                                                        <td className="px-4 py-2 text-right"><select className={`border font-bold rounded px-1 py-0.5 text-center outline-none cursor-pointer ${log.newVal === 'enabled' || log.newVal === '已启用' ? 'border-green-400 text-green-700 bg-green-50' : 'border-[#ff9500] text-[#d07800] bg-orange-50 focus:bg-white'}`} value={log.newVal === '已暂停' || log.newVal === 'paused' ? 'paused' : 'enabled'} onChange={(e) => handleEngineCLogEdit(log.logId, e.target.value)}><option value="paused">已熔断</option><option value="enabled">恢复启用(赦免)</option></select></td>
                                                                                    </tr>
                                                                                ))}
                                                                                {displayChurnLogs.length === 0 && (<tr><td colSpan="5" className="text-center py-8 text-gray-400">未扫描到匹配的活跃数据可供绞杀。</td></tr>)}
                                                                            </tbody>
                                                                        </table>
                                                                        {totalDisplayChurnLogs > MAX_LOGS_DISPLAY && (<div className="py-3 text-center text-gray-400 text-xs font-bold border-t">为了防止浏览器崩溃，界面仅渲染前 {MAX_LOGS_DISPLAY} 条。其余数据全选和导出功能依然生效。</div>)}
                                                                    </div>
                                                                </div>
                                                                <button onClick={handleEngineCExport} className="w-full bg-[#007aff] hover:bg-[#006ee6] text-white text-sm font-bold py-3 rounded-xl shadow-md transition-all flex items-center justify-center gap-2"><IconDownload /> 导出流失率绞杀更新包 (Sparse Update)</button>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                                <input type="file" ref={churnInputRef} onChange={handleChurnUpload} onClick={e => e.target.value = null} className="hidden" accept=".xlsx, .csv" multiple />
                                            </div>
                                        </div>
                                    )}

                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AmazonBidOptimizer />);
    </script>
</body>
</html>
