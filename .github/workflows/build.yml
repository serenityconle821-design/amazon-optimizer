name: Build EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build EXE
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AmazonOptimizer-EXE
          path: dist/
